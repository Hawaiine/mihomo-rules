name: 每日规则同步

on:
  schedule:
    - cron: '0 22 * * *'   # 06:00 Beijing = 22:00 UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Shanghai

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 拉取 mihomo-rules 仓库
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🎨 拉取 Oasisic-Icons 仓库
        uses: actions/checkout@v7
        with:
          repository: Hawaiine/Oasisic-Icons
          path: Oasisic-Icons
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 配置 Python 环境
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: pip install pyyaml

      - name: 🔄 执行同步（8 步串联）
        run: python3 scripts/batch_update.py --no-commit
        env:
          MIHOMO_DISCORD_WEBHOOK: ${{ secrets.MIHOMO_DISCORD_WEBHOOK }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}

      - name: 🔍 verify_configs
        run: python3 scripts/verify_configs.py

      - name: 🔍 verify_rulesets
        run: python3 scripts/verify_rulesets.py

      - name: 🔍 检查变更
        id: check
        run: |
          # 白名单 porcelain：只检查 ruleset/ configs/ scripts/
          if [ -n "$(git status --porcelain -- ruleset/ configs/ scripts/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "🔄 检测到变更"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "⏸️ 无变更，跳过提交"
          fi

      - name: 🧹 过滤仅 Updated 噪音
        id: filter
        if: steps.check.outputs.changed == 'true'
        run: |
          # 收集所有变更的 ruleset/ 文件
          changed_files=$(git diff --name-only -- ruleset/)
          noise_only=true
          noise_files=""
          if [ -z "$changed_files" ]; then
            # 非 ruleset 变更（configs/ scripts/），视为实质变更
            noise_only=false
            echo "📝 非 ruleset 变更，保留"
          fi
          for f in $changed_files; do
            case "$f" in
              ruleset/*)
                # 检查该文件的 diff 是否仅包含 Updated 行变化
                diff_text=$(git diff -- "$f")
                # 标准化：移除 CRLF、行尾空白、Updated 行，看是否还有实质内容
                filtered=$(echo "$diff_text" | sed 's/\r//g' | sed 's/[[:space:]]*$//' | grep -v 'Updated:' | grep -v '^---\|^+++\|^@@\|^diff --git\|^index' || true)
                if [ -z "$filtered" ]; then
                  noise_files="$noise_files $f"
                else
                  noise_only=false
                  echo "📝 实质变更: $f"
                fi
                ;;
              *)
                noise_only=false
                echo "📝 非 ruleset 变更: $f"
                ;;
            esac
          done
          if [ -n "$noise_files" ]; then
            echo "🧹 丢弃仅 Updated 噪音: $noise_files"
            git checkout -- $noise_files
          fi
          # 重新检查（白名单 porcelain）
          if [ -z "$(git status --porcelain -- ruleset/ configs/ scripts/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "⏸️ 过滤后无变更，跳过提交"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "✅ 过滤后仍有实质变更"
          fi

      - name: 📤 提交并推送
        if: steps.filter.outputs.changed == 'true'
        run: |
          git config user.name "mihomo-bot"
          git config user.email "bot@mihomo-rules"
          git add ruleset/ configs/ scripts/
          git commit -m "🔄 每日自动同步 $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git pull --rebase origin ${{ github.ref_name }}
          git push origin HEAD:${{ github.ref_name }}

      - name: ⚠️ 工作流异常通知
        if: failure() && env.MIHOMO_DISCORD_WEBHOOK != ''
        env:
          MIHOMO_DISCORD_WEBHOOK: ${{ secrets.MIHOMO_DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 -c "
          import urllib.request, json, os
          wh = os.environ['MIHOMO_DISCORD_WEBHOOK']
          url = os.environ['RUN_URL']
          payload = {
            'embeds': [{
              'title': '⚠️ 同步工作流异常',
              'color': 15844367,
              'fields': [
                {'name': '💥 状态', 'value': '工作流提前终止，请查看日志'},
                {'name': '🔗 Actions', 'value': f'[查看日志]({url})'},
              ],
              'footer': {'text': 'mihomo-rules 自动同步'}
            }]
          }
          data = json.dumps(payload).encode('utf-8')
          req = urllib.request.Request(wh, data=data, headers={
            'Content-Type': 'application/json',
            'User-Agent': 'mihomo-bot/1.0',
          })
          urllib.request.urlopen(req, timeout=10)
          " 2>/dev/null || true