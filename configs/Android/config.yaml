# ===========================================
# Configuration: mihomo for Android
# Author: Hawaiine
# Updated: 2026-07-20 22:53:05
# ===========================================

# HTTP/SOCKS5 混合代理端口, 客户端配置代理指向此端口即可使用
mixed-port: 7890
# 纯 HTTP 代理端口 (部分客户端不兼容 mixed-port, 需单独指定)
port: 7891
# 纯 SOCKS5 代理端口 (同上)
socks-port: 7892

# 允许同一局域网的其他设备使用此代理
allow-lan: true
# 监听所有网络接口 (0.0.0.0 或 *)
bind-address: "*"

# 运行模式: rule (规则模式), global (全局), direct (直连)
mode: rule

# 日志级别: silent / info / warning / error / debug
log-level: info

# IPv6 总开关 (关闭则阻断所有 IPv6 链接和 DNS AAAA 记录)
ipv6: true

# TCP KeepAlive 间隔 (秒), 保持长连接活跃
keep-alive-interval: 15

# TCP KeepAlive 空闲时间 (秒), 无数据后开始发送探测包
keep-alive-idle: 15

# 进程匹配模式: strict (手机端, 匹配所有进程)
find-process-mode: strict

# RESTful API 监听地址 (Android: 仅本地 127.0.0.1)
external-controller: 127.0.0.1:9090

# API 访问密钥 (面板认证, 替换为随机字符串以保证安全)
secret: "your-api-secret-here"

# 面板 UI (zashboard)
external-ui: ./zashboard
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"

# 策略组选择记录持久化 + fake-ip 缓存 (重启不丢失)
profile:
  store-selected: true
  store-fake-ip: true

# 统一延迟测试 (所有节点同 URL, 结果更准确)
unified-delay: true

# TCP 并发连接所有 IP, 取最快握手的返回
tcp-concurrent: true

# GEO 文件加载模式: memconservative 为低内存设备优化 (路由器推荐)
geodata-loader: memconservative

# 自动更新 GEO 数据库 (首次下载启动, 后续按周检查)
geo-auto-update: true
geo-update-interval: 168

# GeoIP / GeoSite 数据库下载地址 (官方 GitHub Releases)
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"

# TUN 虚拟网卡 (Android 端关闭, 使用 VPN 模式)
tun:
  enable: false

# DNS 配置 (fake-ip 模式, 减少 DNS 泄漏)
# 参考: https://wiki.metacubex.one/config/dns/
dns:
  enable: true                                      # 开启 DNS 解析
  cache-algorithm: arc                              # 自适应替换缓存 (ARC), 比默认 LRU 效率更高
  use-hosts: true                                   # 使用配置文件中的 hosts: 段自定义域名映射
  use-system-hosts: true                            # 使用系统 /etc/hosts 文件
  listen: 127.0.0.1:53                              # DNS 监听端口 (Android VPN 本地, 127.0.0.1 避免端口冲突)
  ipv6: true                                        # 支持 IPv6 DNS 查询
  default-nameserver:                               # 默认 DNS (仅用于解析 nameserver 域名本身的 IP)
    - 119.29.29.29                                  # DNSPod DNS (腾讯, 国内推荐)
    - 223.5.5.5                                     # 阿里 DNS (国内, 低延迟)
  enhanced-mode: fake-ip                            # fake-ip 模式, 劫持所有 DNS 请求
  fake-ip-range: 198.18.0.1/16                      # fake-ip 地址段
  fake-ip-filter-mode: blacklist                    # 黑名单模式: 仅列表中的域名不使用 fake-ip (返回真实 IP)
  fake-ip-filter:                                   # fake-ip-filter-mode 为 blacklist 时, 此列表中的域名跳过 fake-ip
                                                    # ----- RFC 保留/基础设施域名 (覆盖 geosite:private 范围, 无需重复加) -----
    - '+.lan'                                       # 局域网域名 (RFC 6762)
    - '+.local'                                     # 链路本地域名 (RFC 6762)
    - '+.localdomain'                               # 本地域名
    - '+.home.arpa'                                 # 家庭网络域名 (RFC 8375)
    - '+.localhost'                                 # 本机域名 (RFC 6761)
    - '+.invalid'                                   # 无效域名 (RFC 2606)
    - '+.example'                                   # 示例域名 (RFC 2606, 防测试流量误走代理)
    - '+.test'                                      # 测试域名 (RFC 2606)
                                                    # ----- 内网/企业域名 -----
    - '+.corp'                                      # 企业内网域名
    - '+.internal'                                  # 内部域名
                                                    # ----- 系统连通性检测 (Windows/macOS) -----
    - '+.msftconnecttest.com'                       # Windows NCSI 连通性检测 (否则误判无网络)
    - '+.msftncsi.com'                              # Windows NCSI 备用检测
                                                    # ----- 游戏主机 NAT/网络检测 -----
    - '+.srv.nintendo.net'                          # Nintendo Switch NAT 穿透
    - '+.stun.playstation.net'                      # PlayStation NAT 类型检测
    - '+.xboxlive.com'                              # Xbox Live 网络服务
                                                    # ----- NTP 时间同步 (走真实 IP, 避免 fake-ip 导致 NTP 失败) -----
    - '+.pool.ntp.org'                              # NTP 公共池
    - '+.time.apple.com'                            # Apple NTP
    - '+.time.google.com'                           # Google NTP (Android 默认)
                                                    # ----- 路由器管理 (RouterOS 设备连接) -----
    - '+.mikrotik.com'                              # MikroTik RouterOS 设备连接/更新检测 (主路由)
                                                    # ----- 应用特定 (APP 本地回环/登录检测) -----
    - 'localhost.ptlogin2.qq.com'                   # QQ 登录本地回环检测 (精确域名)
                                                    # ----- Geo 规则 (位于具体域名之后) -----
    - 'geosite:cn'                                  # 国内域名: 绕过 fake-ip, 返回真实 IP (提高 CDN 兼容性)
  nameserver-policy:                                # 按 geosite 分流 DNS 查询 (优先于 nameserver)
                                                    # geosite:cn → 国内 DNS, 防止境外 DNS 返回错误 IP
    "geosite:private,cn":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
      - 119.29.29.29                                # UDP 兜底 (国内 DoH 异常时备用)
      - 223.5.5.5                                   # UDP 兜底
                                                    # geosite:geolocation-!cn → 境外 DNS, 防止国内 DNS 污染
                                                    # 使用 DoT (TLS over 853) + UDP 兜底:
                                                    #   - DoT 比 DoH 更轻量(无 HTTP 封装), 且 IP 直连无需域名解析, 更可靠
                                                    #   - UDP 做最后兜底, DoT 异常时自动切换
    "geosite:geolocation-!cn":
      - tls://1.1.1.1                               # Cloudflare DoT (TLS, 853 端口, IP 直连)
      - tls://8.8.8.8                               # Google DoT (TLS, 853 端口, IP 直连)
      - 1.1.1.1                                     # UDP 兜底 (Cloudflare, 国际 DoT 异常时备用)
      - 8.8.8.8                                     # UDP 兜底 (Google, 国际 DoT 异常时备用)
  nameserver:                                       # 常规 DNS 查询 (不匹配 nameserver-policy 的域名)
    - https://doh.pub/dns-query                     # DNSPod DoH (腾讯, 国内优先)
    - https://dns.alidns.com/dns-query              # 阿里 DoH (国内备用)
    - 119.29.29.29                                  # UDP 兜底 (国内 DoH 异常时备用)
    - 223.5.5.5                                     # UDP 兜底
  fallback:                                         # 兜底 DNS (并发查询, 取最快响应)
                                                    # 当 nameserver 结果不可信时 (如被污染的域名), 使用 fallback 结果
                                                    # 使用 DoT (TLS over 853) + UDP 兜底:
                                                    #   - DoT 轻量无 HTTP 封装, IP 直连无需域名解析
                                                    #   - 三协议(DoT/UDP/DoT)并发查询, 谁快用谁, 任一挂了不影响其他
    - tls://1.1.1.1                                 # Cloudflare DoT (TLS, 853 端口, IP 直连, 国际低延迟)
    - tls://8.8.8.8                                 # Google DoT (TLS, 853 端口, IP 直连, 国际备用)
    - 1.1.1.1                                       # UDP 兜底 (Cloudflare, 国际 DoT 异常时备用)
    - 8.8.8.8                                       # UDP 兜底 (Google, 国际 DoT 异常时备用)
  proxy-server-nameserver:                          # 代理服务器域名解析专用 DNS
                                                    # 避免陷入: 解析代理域名 → 走代理 → 解析不了 → 死循环
                                                    # 例: 订阅链接 proxy.example.com → 用此 DNS 直连解析, 不走代理
    - https://doh.pub/dns-query                     # DNSPod DoH (国内, 低延迟, 解析代理节点域名)
    - https://dns.alidns.com/dns-query              # 阿里 DoH (国内备用)
    - 119.29.29.29                                  # UDP 兜底 (国内 DoH 异常时备用)
    - 223.5.5.5                                     # UDP 兜底
  fallback-filter:                                  # fallback 过滤: 以下条件的 nameserver 结果可信, 不使用 fallback
    geoip: true                                     # 检查 nameserver 返回的 IP 归属地
    geoip-code: CN                                  # IP 属于中国 → nameserver 结果可信, 丢弃 fallback
    ipcidr:                                         # 以下 IP 段的 nameserver 结果不可信
      - 240.0.0.0/4                                 # 组播地址 (通常是被污染的返回值)

# TLS/HTTP 嗅探 (fake-ip 模式下识别真实域名, 否则 HTTPS 网站会因 fake-ip 访问异常)
# 参考: https://wiki.metacubex.one/config/sniffer/
sniffer:
  enable: true                                      # 开启 TLS/HTTP 嗅探
  force-dns-mapping: true                           # 强制 DNS 映射: 嗅探结果覆盖 fake-ip 的 DNS 映射
  parse-pure-ip: true                               # 解析纯 IP 连接中的 SNI (部分代理会直连 IP)
  override-destination: false                       # 不覆盖原始目标地址 (仅记录, 不重定向)
  skip-domain:                                      # 保留 DNS mapping 结果, 不嗅探还原域名
    - '+.apple.com'                                 # Apple CDN (避免嗅探后误走代理)
    - '+.digicert.com'                              # 证书吊销检查 (CRL/OCSP, 应直连)
    - '+.microsoft.com'                             # Microsoft CDN (Office/Teams 多 IP, 防嗅探误路由)
    - '+.mikrotik.com'                              # MikroTik RouterOS 设备连接/更新 (主路由, 防嗅探误路由)
  sniff:                                            # 各协议嗅探配置
    TLS:                                            # TLS SNI 嗅探 (最常用)
      ports: [443, 8443]                            # 标准 HTTPS 端口
    HTTP:                                           # HTTP Host 嗅探 (明文协议)
      ports: [80, 8080-8880]                        # 标准 HTTP 端口范围
      override-destination: true                    # HTTP 需覆盖目标以获取正确 Host
    QUIC:                                           # QUIC (HTTP/3) 嗅探
      ports: [443, 8443]                            # 标准 QUIC 端口

proxy-providers:
                                                    # ----- 订阅提供者 (替换为你的真实订阅链接) -----
  provider1:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400                                 # 24小时拉取一次
    path: ./providers/provider1.yaml
    proxy: DIRECT                                   # 直连拉取订阅 (避免无节点时死循环)
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300                                 # 5分钟健康检查

  provider2:
    type: http
    url: "此处填入你的备用订阅链接"
    interval: 86400
    path: ./providers/provider2.yaml
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

                                                    # ----- 地区过滤提供者 (按节点名正则匹配) -----
                                                    # 启用后, 对应地区策略组只显示匹配的节点 (填入与 provider1 相同的订阅地址)
  provider_hk:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400
    path: ./providers/provider_hk.yaml
    proxy: DIRECT
    filter: "(?i)(香港|Hong.Kong|HongKong|HK|HKG|HGC|🇭🇰)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  provider_jp:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400
    path: ./providers/provider_jp.yaml
    proxy: DIRECT
    filter: "(?i)(日本|Japan|JP|JPN|Tokyo|Osaka|🇯🇵)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  provider_us:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400
    path: ./providers/provider_us.yaml
    proxy: DIRECT
    filter: "(?i)(美国|United.States|US|USA|UnitedStates|🇺🇸)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  provider_sg:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400
    path: ./providers/provider_sg.yaml
    proxy: DIRECT
    filter: "(?i)(新加坡|Singapore|SG|SGP|🇸🇬)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

  provider_tw:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400
    path: ./providers/provider_tw.yaml
    proxy: DIRECT
    filter: "(?i)(台湾|Taiwan|TW|TWN|🇹🇼)"
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300

proxy-groups:
  - name: "♻️ 自动选择"
    type: url-test
    proxies:
      - "🇭🇰 香港节点"
      - "🇯🇵 日本节点"
      - "🇺🇸 美国节点"
      - "🇸🇬 新加坡节点"
      - "🇹🇼 台湾节点"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true

  - name: "🇭🇰 香港节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_hk

  - name: "🇯🇵 日本节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_jp

  - name: "🇺🇸 美国节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_us

  - name: "🇸🇬 新加坡节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_sg

  - name: "🇹🇼 台湾节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_tw

  - name: "🛑 全球拦截"
    type: select
    proxies:
