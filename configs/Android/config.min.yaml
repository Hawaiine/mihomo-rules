mixed-port: 7890
port: 7891
socks-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: true
keep-alive-interval: 15
keep-alive-idle: 15
find-process-mode: strict
external-controller: 127.0.0.1:9090
secret: "your-api-secret-here"
external-ui: ./zashboard
external-ui-name: zashboard
external-ui-url: "https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip"
profile:
  store-selected: true
  store-fake-ip: true
unified-delay: true
tcp-concurrent: true
geodata-loader: memconservative
geo-auto-update: true
geo-update-interval: 168
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip-lite.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country-lite.mmdb"
  asn: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb"
tun:
  enable: false
dns:
  enable: true
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  listen: 127.0.0.1:53
  ipv6: true
  default-nameserver:
    - 119.29.29.29
    - 223.5.5.5
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.localdomain'
    - '+.home.arpa'
    - '+.localhost'
    - '+.invalid'
    - '+.example'
    - '+.test'
    - '+.corp'
    - '+.internal'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.srv.nintendo.net'
    - '+.stun.playstation.net'
    - '+.xboxlive.com'
    - '+.pool.ntp.org'
    - '+.time.apple.com'
    - '+.time.google.com'
    - '+.mikrotik.com'
    - 'localhost.ptlogin2.qq.com'
    - 'geosite:cn'
  nameserver-policy:
    "geosite:private,cn":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
      - 119.29.29.29
      - 223.5.5.5
    "geosite:geolocation-!cn":
      - tls://1.1.1.1
      - tls://8.8.8.8
      - 1.1.1.1
      - 8.8.8.8
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 119.29.29.29
    - 223.5.5.5
  fallback:
    - tls://1.1.1.1
    - tls://8.8.8.8
    - 1.1.1.1
    - 8.8.8.8
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 119.29.29.29
    - 223.5.5.5
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: false
  skip-domain:
    - '+.apple.com'
    - '+.digicert.com'
    - '+.microsoft.com'
    - '+.mikrotik.com'
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]
proxy-providers:
  provider1:
    type: http
    url: "此处填入你的订阅链接"
    interval: 86400
    path: ./providers/provider1.yaml
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
  provider2:
    type: http
    url: "此处填入你的备用订阅链接"
    interval: 86400
    path: ./providers/provider2.yaml
    proxy: DIRECT
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
  provider_hk:
