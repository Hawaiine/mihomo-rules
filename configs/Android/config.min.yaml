      url: https://cp.cloudflare.com/generate_204
      interval: 300
proxy-groups:
  - name: "♻️ 自动选择"
    type: url-test
    proxies:
      - "🇭🇰 香港节点"
      - "🇯🇵 日本节点"
      - "🇺🇸 美国节点"
      - "🇸🇬 新加坡节点"
      - "🇹🇼 台湾节点"
    url: "https://cp.cloudflare.com/generate_204"
    interval: 300
    tolerance: 50
    lazy: true
  - name: "🇭🇰 香港节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_hk
  - name: "🇯🇵 日本节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_jp
  - name: "🇺🇸 美国节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_us
  - name: "🇸🇬 新加坡节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_sg
  - name: "🇹🇼 台湾节点"
    type: select
    proxies:
      - DIRECT
    use:
      - provider_tw
  - name: "🛑 全球拦截"
    type: select
    proxies:
      - DIRECT
      - REJECT
  - name: "🔧 手动切换"
    type: select
    proxies:
      - DIRECT
      - "♻️ 自动选择"
    use:
