# ===========================================
# SSH 隧道代理
# 参考: https://wiki.metacubex.one/en/config/proxies/
# ===========================================
- name: "ssh-tunnel"
  type: ssh
  server: ssh.example.com
  port: 22
  username: "root"
  password: "your-password"        # 密码认证
  # private-key: "~/.ssh/id_rsa"   # 密钥认证 (推荐)
  # private-key-passphrase: ""     # 密钥密码 (可选)
  # host-key: "..."                # 主机密钥验证 (可选)
  # fingerprint: "..."             # 指纹验证 (可选)
