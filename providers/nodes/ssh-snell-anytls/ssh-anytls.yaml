# ===========================================
# AnyTLS (任意 TLS 隧道)
# 参考: https://wiki.metacubex.one/en/config/proxies/
# ===========================================
- name: "anytls"
  type: anytls
  server: server.example.com
  port: 443
  password: "your-password"
  udp: true
  sni: cloudflare.com
  skip-cert-verify: false
  # client-fingerprint: chrome     # TLS 指纹模拟
