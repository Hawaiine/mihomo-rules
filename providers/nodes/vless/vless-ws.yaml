# ===========================================
# VLESS + WebSocket
# 参考: https://wiki.metacubex.one/en/config/proxies/vless
# ===========================================
- name: "vless-ws"
  type: vless
  server: server.example.com
  port: 443
  uuid: "your-uuid-here"
  udp: true
  network: ws
  ws-opts:
    path: "/ws"
    headers:
      Host: cloudflare.com
