# ===========================================
# VLESS + REALITY (抗封锁, 无需证书)
# 参考: https://wiki.metacubex.one/en/config/proxies/vless
# ===========================================
- name: "vless-reality"
  type: vless
  server: server.example.com
  port: 443
  uuid: "your-uuid-here"
  udp: true
  tls: true
  servername: yahoo.com             # 回 Fallback 域名 (推荐大站)
  fingerprint: random
  reality-opts:
    public-key: "your-reality-public-key"
    short-id: "your-short-id"
