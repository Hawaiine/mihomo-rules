# ===========================================
# Trojan + Shadowsocks AEAD 加密 (trojan-go)
# 参考: https://wiki.metacubex.one/en/config/proxies/trojan
# ===========================================
- name: "trojan-ss"
  type: trojan
  server: server.example.com
  port: 443
  password: "your-password"
  udp: true
  sni: server.example.com
  alpn:
    - h2
    - http/1.1
  ss-opts:
    enabled: true
    method: aes-128-gcm            # 可选: aes-128-gcm / aes-256-gcm / chacha20-ietf-poly1305
    password: "ss-password"
