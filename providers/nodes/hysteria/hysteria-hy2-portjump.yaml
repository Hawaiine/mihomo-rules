# ===========================================
# Hysteria2 + 端口跳跃 (Port Hopping)
# 参考: https://wiki.metacubex.one/en/config/proxies/hysteria2
# ===========================================
- name: "hy2-hop"
  type: hysteria2
  server: server.example.com
  port: 443
  ports: 443-8443                  # 端口跳跃范围
  hop-interval: 30                 # 跳跃间隔 (秒)
  password: "your-password"
  up: "50 Mbps"
  down: "200 Mbps"
  sni: server.example.com
  skip-cert-verify: true
